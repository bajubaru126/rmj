<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KML Color Parsing Test</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      color: #333;
      border-bottom: 3px solid #1976d2;
      padding-bottom: 10px;
    }
    .test-case {
      margin: 20px 0;
      padding: 15px;
      background: #f9f9f9;
      border-left: 4px solid #1976d2;
      border-radius: 4px;
    }
    .color-box {
      display: inline-block;
      width: 60px;
      height: 60px;
      border: 2px solid #333;
      border-radius: 4px;
      margin-right: 15px;
      vertical-align: middle;
    }
    .result {
      display: inline-block;
      vertical-align: middle;
    }
    .label {
      font-weight: bold;
      color: #555;
      margin-right: 10px;
    }
    .value {
      font-family: 'Courier New', monospace;
      background: #e8e8e8;
      padding: 4px 8px;
      border-radius: 3px;
      color: #333;
    }
    .success {
      color: #4caf50;
      font-weight: bold;
    }
    .error {
      color: #f44336;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎨 KML Color Parsing Test</h1>
    <p>Testing color conversion from KML format (AABBGGRR) to CSS hex (#RRGGBB)</p>
    
    <div id="results"></div>
  </div>

  <script>
    // Function to convert KML color (AABBGGRR) to CSS hex (#RRGGBB)
    function kmlColorToHex(kmlColor) {
      if (!kmlColor || kmlColor.length < 6) return '#FF6B35'; // Default color
      
      // KML format: AABBGGRR (8 characters) or BBGGRR (6 characters)
      // We need: #RRGGBB
      
      let color = kmlColor.toLowerCase();
      
      // Remove 'ff' prefix if present (full opacity)
      if (color.length === 8) {
        color = color.substring(2); // Remove AA (opacity)
      }
      
      if (color.length === 6) {
        // Convert BBGGRR to RRGGBB
        const bb = color.substring(0, 2);
        const gg = color.substring(2, 4);
        const rr = color.substring(4, 6);
        return `#${rr}${gg}${bb}`.toUpperCase();
      }
      
      return '#FF6B35'; // Default color if format is wrong
    }

    // Test cases from your KML file
    const testCases = [
      {
        name: 'SUMENEP - JT01 (LineStyle)',
        kmlColor: 'ffd27619',
        expectedHex: '#1976D2',
        description: 'Blue color from Google Earth'
      },
      {
        name: 'JT01 - KEBUMEN (LineStyle)',
        kmlColor: 'ff2dc0fb',
        expectedHex: '#FBC02D',
        description: 'Yellow/Gold color'
      },
      {
        name: 'SUMENEP - KEBUMEN (LineStyle)',
        kmlColor: 'ff2f2fd3',
        expectedHex: '#D32F2F',
        description: 'Red color'
      },
      {
        name: 'Icon color reference',
        kmlColor: '1976d2',
        expectedHex: '#D27619',
        description: 'Without alpha channel (6 chars)'
      }
    ];

    const resultsDiv = document.getElementById('results');

    testCases.forEach(test => {
      const result = kmlColorToHex(test.kmlColor);
      const isCorrect = result === test.expectedHex;
      
      const testDiv = document.createElement('div');
      testDiv.className = 'test-case';
      testDiv.innerHTML = `
        <h3>${test.name}</h3>
        <p style="color: #666; margin: 5px 0;">${test.description}</p>
        <div style="margin: 15px 0;">
          <span class="label">KML Input:</span>
          <span class="value">${test.kmlColor}</span>
        </div>
        <div style="margin: 15px 0;">
          <span class="label">Expected:</span>
          <span class="value">${test.expectedHex}</span>
          <div class="color-box" style="background-color: ${test.expectedHex};"></div>
        </div>
        <div style="margin: 15px 0;">
          <span class="label">Result:</span>
          <span class="value">${result}</span>
          <div class="color-box" style="background-color: ${result};"></div>
        </div>
        <div style="margin: 15px 0;">
          <span class="label">Status:</span>
          <span class="${isCorrect ? 'success' : 'error'}">
            ${isCorrect ? '✅ PASS' : '❌ FAIL'}
          </span>
        </div>
      `;
      
      resultsDiv.appendChild(testDiv);
    });

    // Summary
    const passCount = testCases.filter(test => kmlColorToHex(test.kmlColor) === test.expectedHex).length;
    const summaryDiv = document.createElement('div');
    summaryDiv.style.cssText = 'margin-top: 30px; padding: 20px; background: #e3f2fd; border-radius: 8px; text-align: center;';
    summaryDiv.innerHTML = `
      <h2 style="margin: 0 0 10px 0; color: #1976d2;">Test Summary</h2>
      <p style="font-size: 24px; margin: 0;">
        <span class="${passCount === testCases.length ? 'success' : 'error'}">
          ${passCount} / ${testCases.length} tests passed
        </span>
      </p>
    `;
    resultsDiv.appendChild(summaryDiv);
  </script>
</body>
</html>
